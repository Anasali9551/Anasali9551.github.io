<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Downloads - YouTube Video Downloader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #120000, #000000); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: rgba(20, 20, 20, 0.85); padding: 40px; border-radius: 15px; box-shadow: 0 8px 32px 0 rgba(255, 0, 0, 0.2); border: 1px solid rgba(255, 0, 0, 0.3); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #ff3333; margin-bottom: 10px; font-size: 28px; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        p { color: #aaa; margin-bottom: 25px; font-size: 14px; }
        input[type="text"] { width: 100%; padding: 12px 20px; background: #222; border: 1px solid #444; border-radius: 25px; color: #fff; font-size: 16px; margin-bottom: 20px; outline: none; transition: 0.3s; text-align: center; }
        input[type="text"]:focus { border-color: #ff3333; box-shadow: 0 0 10px rgba(255,51,51,0.5); }
        button { width: 100%; padding: 12px; background: #ff3333; border: none; border-radius: 25px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #cc0000; box-shadow: 0 0 15px rgba(255,51,51,0.7); }
        .result-box { margin-top: 25px; }
        iframe { border: none; border-radius: 10px; width: 100%; height: 60px; background: transparent; }
    </style>
</head>
<body>

<div class="container">
    <h1>Silent Downloads</h1>
    <p>Download YouTube Videos For Free</p>
    
    <input type="text" id="videoLink" placeholder="Paste YouTube video link here...">
    <button onclick="downloadVideo()">Generate Download Link</button>

    <div class="result-box" id="resultBox" style="display: none;">
        <iframe id="downloadFrame" src="" scrolling="no"></iframe>
    </div>
</div>

<script>
    function downloadVideo() {
        var videoUrl = document.getElementById('videoLink').value.trim();
        if (videoUrl === "") {
            alert("Please paste a YouTube video link first!");
            return;
        }

        // ہر قسم کے یوٹیوب لنک سے ID نکالنے والا نیا اور بہتر طریقہ
        var videoId = "";
        if (videoUrl.indexOf("youtu.be") !== -1) {
            videoId = videoUrl.split("youtu.be/")[1].split("?")[0];
        } else if (videoUrl.indexOf("youtube.com/watch") !== -1) {
            var urlParams = new URLSearchParams(new URL(videoUrl).search);
            videoId = urlParams.get('v');
        } else if (videoUrl.indexOf("youtube.com/embed/") !== -1) {
            videoId = videoUrl.split("youtube.com/embed/")[1].split("?")[0];
        }

        if (videoId && videoId.length === 11) {
            var apiUrl = "https://twoshotltd.com/download.php?id=" + videoId;
            var frame = document.getElementById('downloadFrame');
            frame.src = apiUrl;
            document.getElementById('resultBox').style.display = "block";
        } else {
            alert("Invalid link! Please paste a valid YouTube URL.");
        }
    }
</script>

</body>
</html>
